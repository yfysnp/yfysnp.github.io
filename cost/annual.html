<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025-2026年月度成本对比分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "Microsoft YaHei", sans-serif; 
            background: #f5f7fa; 
            padding: 10px; /* 缩小整体内边距，更紧凑 */
            overflow-x: hidden; /* 防止横向滚动 */
            height: 100vh; /* 确保body占满视口高度 */
            margin: 0;
        }
        
        /* 标题区域：适配截图的标题样式 */
        .title-container {
            position: relative;
            background: #f5f7fa;
            padding: 5px 0;
            margin-bottom: 10px;
            height: 40px; /* 固定标题高度，避免影响比例 */
        }
        .main-title {
            font-size: 20px; /* 缩小标题字号，贴合截图 */
            font-weight: 600;
            text-align: center;
            color: #333;
            margin: 0;
            line-height: 40px; /* 垂直居中 */
        }
        /* 重置布局按钮：贴合截图右上角样式 */
        .reset-btn {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            padding: 4px 10px;
            background: #1677ff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        .reset-btn:hover {
            background: #0f62d9;
        }

        /* 拖拽面板样式：贴合截图的视觉效果 */
        .draggable-panel {
            position: absolute;
            background: white;
            padding: 0.8rem; /* 缩小内边距 */
            border-radius: 4px; /* 更小的圆角，贴合截图 */
            box-shadow: 0 1px 6px rgba(0,0,0,0.08); /* 更淡的阴影 */
            min-width: 300px;
            resize: both;
            overflow: hidden;
            user-select: none;
            z-index: 10;
            border: 1px solid #e8e8e8; /* 新增边框，贴合截图 */
        }
        .draggable-panel .panel-header {
            cursor: move;
            padding: 0.3rem 0;
            margin-bottom: 0.5rem;
            user-select: none;
            font-size: 14px; /* 缩小面板标题字号 */
            color: #555;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="relative min-h-[calc(100vh-20px)]" id="panelContainer">
        <!-- 标题容器 -->
        <div class="title-container">
            <h1 class="main-title">2025-2026年月度成本对比分析</h1>
            <button class="reset-btn" id="resetLayoutBtn">重置布局</button>
        </div>

        <!-- 上半部分：图表+表格并列（占视口70%高度） -->
        <div class="draggable-panel" id="panel2" style="left: 10px; top: 50px; z-index: 12; width: calc(50vw - 15px); height: calc(70vh - 60px);">
            <h2 class="panel-header">📈 成本对比 + 占比折线（双Y轴）</h2>
            <div id="mainChart" class="w-full h-[calc(100%-30px)]"></div>
        </div>

        <div class="draggable-panel" id="panel3" style="left: calc(50vw + 5px); top: 50px; z-index: 13; width: calc(50vw - 15px); height: calc(70vh - 60px);">
            <h2 class="panel-header">📊 26年占25年同期占比</h2>
            <div id="ratioTable" class="w-full h-[calc(100%-30px)] overflow-y-auto"></div>
        </div>

        <!-- 下半部分：JSON面板（占视口30%高度） -->
        <div class="draggable-panel" id="panel1" style="left: 10px; top: calc(70vh); z-index: 11; width: calc(100vw - 20px); height: calc(30vh - 20px);">
            <h2 class="panel-header">📝 JSON数据录入（修改后自动刷新）</h2>
            <textarea id="jsonInput" class="w-full h-[calc(100%-30px)] p-2 border border-gray-200 rounded font-mono text-sm"></textarea>
        </div>
    </div>

    <script>
        const myChart = echarts.init(document.getElementById('mainChart'));
        const monthList = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        
        const defaultData = {
            "2025": [1200,1300,1250,1400,1350,1500,1450,1600,1550,1700,1650,1800],
            "2026": [1350,1420,1380,1500,1600,1580,null,null,null,null,null,null]
        };

        let timer = null;

        // 本地存储：保存/读取面板布局
        const STORAGE_KEY = "dashboard_layout_v2";
        function saveLayout() {
            const data = {};
            document.querySelectorAll('.draggable-panel').forEach(el => {
                data[el.id] = {
                    x: el.getAttribute('data-x') || 0,
                    y: el.getAttribute('data-y') || 0,
                    w: el.style.width,
                    h: el.style.height
                };
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        function loadLayout() {
            const data = localStorage.getItem(STORAGE_KEY);
            if(!data) return;
            const layouts = JSON.parse(data);
            for(const id in layouts) {
                const el = document.getElementById(id);
                if(!el) continue;
                const l = layouts[id];
                el.style.width = l.w;
                el.style.height = l.h;
                const x = parseFloat(l.x) || 0;
                const y = parseFloat(l.y) || 0;
                el.setAttribute('data-x', x);
                el.setAttribute('data-y', y);
                el.style.transform = `translate(${x}px, ${y}px)`;
            }
            myChart.resize();
        }

        // 重置布局函数（适配30%/70%高度比例）
        function resetLayout() {
            localStorage.removeItem(STORAGE_KEY);
            // 基于视口高度的30%/70%比例布局
            const viewportHeight = window.innerHeight;
            const topPanelHeight = `calc(70vh - 60px)`; // 70%视口高度 - 标题/间距
            const bottomPanelHeight = `calc(30vh - 20px)`; // 30%视口高度 - 间距
            
            const panels = {
                panel2: { 
                    left: '10px', 
                    top: '50px', 
                    width: `calc(50vw - 15px)`, 
                    height: topPanelHeight, 
                    zIndex:12 
                },
                panel3: { 
                    left: `calc(50vw + 5px)`, 
                    top: '50px', 
                    width: `calc(50vw - 15px)`, 
                    height: topPanelHeight, 
                    zIndex:13 
                },
                panel1: { 
                    left: '10px', 
                    top: `calc(70vh)`, 
                    width: `calc(100vw - 20px)`, 
                    height: bottomPanelHeight, 
                    zIndex:11 
                }
            };
            
            for(const id in panels) {
                const el = document.getElementById(id);
                if(el) {
                    el.style.left = panels[id].left;
                    el.style.top = panels[id].top;
                    el.style.width = panels[id].width;
                    el.style.height = panels[id].height;
                    el.style.zIndex = panels[id].zIndex;
                    el.removeAttribute('data-x');
                    el.removeAttribute('data-y');
                    el.style.transform = 'translate(0px, 0px)';
                }
            }
            myChart.resize();
            alert('布局已重置为默认状态！');
        }

        // 拖拽 + 缩放（保留原有交互）
        interact('.draggable-panel')
            .draggable({
                inertia: true,
                modifiers: [
                    interact.modifiers.restrictRect({
                        restriction: 'body',
                        endOnly: false
                    })
                ],
                listeners: {
                    move(event) {
                        const target = event.target;
                        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                        myChart.resize();
                    },
                    end: saveLayout
                }
            })
            .resizable({
                edges: { left: true, right: true, bottom: true, top: true },
                listeners: {
                    move(event) {
                        const target = event.target;
                        let x = (parseFloat(target.getAttribute('data-x')) || 0);
                        let y = (parseFloat(target.getAttribute('data-y')) || 0);
                        target.style.width = event.rect.width + 'px';
                        target.style.height = event.rect.height + 'px';
                        x += event.deltaRect.left;
                        y += event.deltaRect.top;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                        myChart.resize();
                    },
                    end: saveLayout
                }
            });

        // 初始化
        window.onload = function() {
            loadLayout();
            const inputEl = document.getElementById('jsonInput');
            inputEl.value = JSON.stringify(defaultData, null, 2);
            refreshChart();

            document.getElementById('resetLayoutBtn').addEventListener('click', resetLayout);

            inputEl.addEventListener('input', function() {
                clearTimeout(timer);
                timer = setTimeout(() => refreshChart(), 300);
            });
        };

        // 自动刷新图表和表格
        function refreshChart() {
            try {
                const inputData = JSON.parse(document.getElementById('jsonInput').value);
                const data2025 = inputData["2025"] || [];
                const data2026 = inputData["2026"] || [];
                if (data2025.length !== 12 || data2026.length !== 12) return;
                
                renderChart(data2025, data2026);
                renderTable(data2025, data2026);
            } catch (e) {
                console.log("JSON格式错误：", e);
            }
        }

        // 绘制双Y轴图表
        function renderChart(data2025, data2026) {
            const ratioData = data2025.map((val, idx) => {
                const c26 = data2026[idx];
                return (val && val !== 0 && c26) ? parseFloat(((c26 / val) * 100).toFixed(2)) : null;
            });
            const option = {
                tooltip: {
                    trigger: 'axis',
                    formatter: params => {
                        const i = params[0].dataIndex;
                        return `${params[0].name}<br/>2025年：${data2025[i]??"-"} 元<br/>2026年：${data2026[i]??"-"} 元<br/>占比：${ratioData[i]?ratioData[i]+"%":"-"}`;
                    }
                },
                legend: { data: ['2025年成本','2026年成本','26年占25年占比(%)'], top: 5, fontSize: 12 },
                xAxis: { type: 'category', data: monthList, axisLabel: { fontSize: 11 } },
                yAxis: [
                    { type: 'value', name: '成本（元）', position: 'left', axisLabel: { fontSize: 11 } },
                    { type: 'value', name: '占比（%）', position: 'right', axisLabel: { fontSize: 11 } }
                ],
                series: [
                    { name: '2025年成本', type: 'line', yAxisIndex:0, data: data2025, smooth:true, color:'#1677ff', lineStyle:{width:2} },
                    { name: '2026年成本', type: 'line', yAxisIndex:0, data: data2026, smooth:true, color:'#36cbcb', lineStyle:{width:2} },
                    { name: '26年占25年占比(%)', type: 'line', yAxisIndex:1, data: ratioData, smooth:true, color:'#ff7d00', lineStyle:{width:2}, symbol:'circle' }
                ],
                grid: { top: 30, left: 40, right: 40, bottom: 30 } // 调整图表内边距，更紧凑
            };
            myChart.setOption(option);
        }

        // 绘制占比表格（贴合截图样式）
        function renderTable(data2025, data2026) {
            let html = `<table class="w-full border-collapse text-sm"><thead><tr style="background:#f8f8f8;">
                <th class="border border-gray-200 p-1 text-center" style="font-size:11px;">月份</th>
                <th class="border border-gray-200 p-1 text-center" style="font-size:11px;">2025年</th>
                <th class="border border-gray-200 p-1 text-center" style="font-size:11px;">2026年</th>
                <th class="border border-gray-200 p-1 text-center" style="font-size:11px;">同比占比</th>
            </tr></thead><tbody>`;
            
            monthList.forEach((m, i) => {
                const c25 = data2025[i], c26 = data2026[i];
                let r = "-", cls = "text-gray-400";
                if (c25 && c25!==0 && c26) {
                    const v = (c26/c25*100).toFixed(2);
                    r = v+"%"; cls = v>=100 ? "text-red-600 font-bold" : "text-green-600 font-bold";
                }
                html += `<tr class="hover:bg-gray-50">
                    <td class="border border-gray-200 p-1 text-center" style="font-size:11px;">${m}</td>
                    <td class="border border-gray-200 p-1 text-center" style="font-size:11px;">${c25??"-"}</td>
                    <td class="border border-gray-200 p-1 text-center" style="font-size:11px;">${c26??"-"}</td>
                    <td class="border border-gray-200 p-1 text-center ${cls}" style="font-size:11px;">${r}</td>
                </tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('ratioTable').innerHTML = html;
        }

        // 窗口缩放时刷新图表和布局
        window.addEventListener('resize', () => {
            myChart.resize();
            // 若未手动调整布局，窗口缩放时保持30%/70%比例
            if(!localStorage.getItem(STORAGE_KEY)) {
                const topPanelHeight = `calc(70vh - 60px)`;
                const bottomPanelHeight = `calc(30vh - 20px)`;
                
                document.getElementById('panel2').style.width = `calc(50vw - 15px)`;
                document.getElementById('panel2').style.height = topPanelHeight;
                document.getElementById('panel3').style.left = `calc(50vw + 5px)`;
                document.getElementById('panel3').style.width = `calc(50vw - 15px)`;
                document.getElementById('panel3').style.height = topPanelHeight;
                document.getElementById('panel1').style.top = `calc(70vh)`;
                document.getElementById('panel1').style.width = `calc(100vw - 20px)`;
                document.getElementById('panel1').style.height = bottomPanelHeight;
            }
        });
    </script>
</body>
</html>
