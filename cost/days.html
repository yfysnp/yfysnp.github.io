<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日维度成本/用量分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "Microsoft YaHei", sans-serif; 
            background: #f5f7fa; 
            padding: 10px;
            overflow-x: hidden;
            min-height: 100vh;
            margin: 0;
            transition: background 0.3s ease;
        }

        /* 暗黑模式 */
        body.dark {
            background: #1e1e2f;
            color: #e5e7eb;
        }
        
        /* ========== 顶部容器优化：全宽度不换行，高度稳定 ========== */
        .title-container {
            background: #f5f7fa;
            padding: 10px 12px;
            margin-bottom: 12px;
            border-radius: 4px;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: nowrap;
            width: 100%;
        }
        body.dark .title-container { background: #1e1e2f; }

        /* 左侧输入区：禁止压缩换行 */
        .input-group {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .input-item {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        /* 中间主标题：自适应压缩 */
        .main-title {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            color: #333;
            line-height: 1.4;
            transition: color 0.3s ease;
            flex: 1;
            min-width: 240px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        body.dark .main-title { color: #e5e7eb; }

        /* 右侧按钮区：禁止压缩换行 */
        .btn-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .input-label { font-size: 13px; color: #555; }
        body.dark .input-label { color: #d1d5db; }

        /* 输入框样式 */
        .custom-input {
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid #dcdfe6;
            font-size: 14px;
            width: 80px;
            transition: all 0.3s ease;
            outline: none;
        }
        .custom-input:focus {
            border-color: #1677ff;
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.2);
        }
        #startDatePicker.custom-input { width: 120px; }
        body.dark .custom-input {
            background: #373750;
            border-color: #444;
            color: #e5e7eb;
        }

        /* 日期选择器层级 */
        .flatpickr-calendar { z-index: 9999 !important; }
        body.dark .flatpickr-calendar {
            background: #2d2d42 !important;
            border-color: #444 !important;
        }
        body.dark .flatpickr-day { color: #e5e7eb !important; }
        body.dark .flatpickr-day:hover { background: #373750 !important; }
        body.dark .flatpickr-day.selected { background: #1677ff !important; color: white !important; }

        /* 通用按钮 */
        .common-btn {
            padding: 7px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .reset-btn { background: #1677ff; color: white; }
        .reset-btn:hover { background: #0f62d9; }
        .theme-toggle-btn { background: #666; color: white; }
        .theme-toggle-btn:hover { background: #444; }
        .copy-btn { background: #00b42a; color: white; }
        .copy-btn:hover { background: #009a25; }
        .clear-btn { background: #ff7d00; color: white; }
        .clear-btn:hover { background: #e67000; }
        body.dark .reset-btn { background: #2563eb; }
        body.dark .theme-toggle-btn { background: #374151; }
        body.dark .copy-btn { background: #10b981; }
        body.dark .clear-btn { background: #f97316; }

        /* 拖拽面板：核心修复，默认位置动态适配 */
        .draggable-panel {
            position: absolute;
            background: white;
            padding: 8px;
            border-radius: 4px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
            min-width: 280px;
            resize: both;
            overflow: hidden;
            z-index: 10;
            border: 1px solid #e8e8e8;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        body.dark .draggable-panel {
            background: #2d2d42;
            border: 1px solid #444;
        }
        .panel-header {
            cursor: move;
            padding: 4px 0;
            margin-bottom: 8px;
            user-select: none;
            font-size: 14px;
            color: #555;
            font-weight: 600;
            flex-shrink: 0;
        }
        body.dark .panel-header { color: #d1d5db; }
        .panel-content {
            flex: 1;
            width: 100%;
            overflow: hidden;
        }
        #jsonInput, #mainChart {
            width: 100% !important;
            height: 100% !important;
            border: 1px solid #dcdfe6;
            border-radius: 3px;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            resize: none;
            transition: all 0.3s ease;
        }
        body.dark #jsonInput {
            background: #373750;
            color: #e5e7eb;
            border-color: #444;
        }

        /* 提示框 */
        .error-tip {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            background: #ff4d4f;
            color: white;
            border-radius: 4px;
            font-size: 12px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        body.dark .error-tip { background: #ef4444; }
        .error-tip.show { opacity: 1; }

        /* ========== 平板/中等宽度适配（768px-1400px） ========== */
        @media screen and (max-width: 1400px) {
            .title-container {
                gap: 8px;
                padding: 8px 10px;
            }
            .input-group { gap: 10px; }
            .main-title { font-size: 17px; min-width: 200px; }
            .common-btn { padding: 6px 10px; font-size: 13px; }
            .custom-input { font-size: 13px; }
            .input-label { font-size: 12px; }
        }

        /* ========== 移动端专属适配（屏幕宽度<768px） ========== */
        @media screen and (max-width: 768px) {
            body { padding: 8px; }
            .title-container {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 10px;
                flex-wrap: wrap;
            }
            .input-group {
                justify-content: space-between;
                width: 100%;
                gap: 8px;
            }
            .main-title {
                font-size: 16px;
                min-width: auto;
                width: 100%;
                margin: 4px 0;
            }
            .btn-container {
                width: 100%;
                justify-content: space-between;
                gap: 6px;
            }
            .common-btn {
                padding: 8px 6px;
                font-size: 12px;
                flex: 1;
                min-width: 0;
            }
            .custom-input {
                font-size: 14px;
                flex: 1;
            }
            #startDatePicker.custom-input { flex: 1.5; }
            .input-label { font-size: 13px; }

            /* 移动端面板默认尺寸，保证不溢出 */
            #chartPanel {
                left: 8px !important;
                top: auto !important;
                width: calc(100vw - 16px) !important;
                height: 50vh !important;
                position: relative !important;
                margin-bottom: 8px;
            }
            #jsonPanel {
                left: 8px !important;
                top: auto !important;
                width: calc(100vw - 16px) !important;
                height: 35vh !important;
                position: relative !important;
            }
            .panel-header { font-size: 15px; }
            #jsonInput, #mainChart { font-size: 13px; }
        }

        /* 超小屏适配（<400px） */
        @media screen and (max-width: 400px) {
            .common-btn {
                font-size: 11px;
                padding: 7px 4px;
            }
            .input-label { font-size: 12px; }
            .main-title { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="relative" id="panelContainer">
        <!-- 重构后的顶部容器 -->
        <div class="title-container" id="titleContainer">
            <!-- 左侧输入区 -->
            <div class="input-group">
                <div class="input-item">
                    <span class="input-label">开始日期：</span>
                    <input type="text" id="startDatePicker" class="flatpickr-input custom-input">
                </div>
                <div class="input-item">
                    <span class="input-label">产品：</span>
                    <input type="text" id="productNameInput" class="custom-input" placeholder="如：日志">
                </div>
            </div>

            <!-- 中间主标题 -->
            <h1 class="main-title" id="mainTitle">日维度成本/用量分析</h1>

            <!-- 右侧按钮区 -->
            <div class="btn-container">
                <button class="common-btn copy-btn" id="copyLinkBtn">复制分享链接</button>
                <button class="common-btn clear-btn" id="clearDataBtn">清空数据</button>
                <button class="common-btn theme-toggle-btn" id="themeToggleBtn">切换暗黑</button>
                <button class="common-btn reset-btn" id="resetLayoutBtn">重置布局</button>
            </div>
        </div>

        <!-- 图表面板 -->
        <div class="draggable-panel" id="chartPanel">
            <h2 class="panel-header">📈 用量趋势图表</h2>
            <div class="panel-content">
                <div id="mainChart"></div>
            </div>
        </div>

        <!-- 数据录入面板 -->
        <div class="draggable-panel" id="jsonPanel">
            <h2 class="panel-header">📝 用量数据录入（每行一个数字，修改后自动刷新）</h2>
            <div class="panel-content">
                <textarea id="jsonInput"></textarea>
            </div>
        </div>
    </div>
    <div class="error-tip" id="errorTip"></div>

    <script>
        // 初始化图表
        const myChart = echarts.init(document.getElementById('mainChart'));
        let productName = '';
        
        // 默认日期 = 当前日期 - 15天
        const getDefaultStartDate = () => {
            const date = new Date();
            date.setDate(date.getDate() - 15);
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };
        let startDate = getDefaultStartDate();

        // 默认数据
        const DEFAULT_DATA = `20442
20629
19180
18713
18466
18382
18382
18373
18466
18549
18532
18526
18344
18306`;

        // 防抖函数
        const debounce = (func, delay = 300) => {
            let timer = null;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => func(...args), delay);
            };
        };

        // 提示框
        const showError = (msg) => {
            const tip = document.getElementById('errorTip');
            tip.textContent = msg;
            tip.classList.add('show');
            setTimeout(() => tip.classList.remove('show'), 2000);
        };

        // 解析URL参数
        const getUrlParams = () => {
            const p = new URLSearchParams(location.search);
            return { date: p.get('date'), product: p.get('product'), data: p.get('data') };
        };

        // 数据编码/解码
        const decodeUsageData = (d) => d ? decodeURIComponent(d).split(',').join('\n') : DEFAULT_DATA;
        const encodeUsageData = (t) => encodeURIComponent(t.split('\n').filter(l => l.trim()));

        // 生成日期标签
        const generateDateLabels = (start, count) => {
            const labels = [];
            const date = new Date(start);
            for (let i = 0; i < count; i++) {
                labels.push(`${date.getMonth() + 1}月${date.getDate()}日`);
                date.setDate(date.getDate() + 1);
            }
            return labels;
        };

        // 更新页面主标题
        const updateTitle = (dateStr, pName) => {
            const date = new Date(dateStr);
            const title = `日维度${pName.trim()}成本/用量分析（${date.getMonth() + 1}月${date.getDate()}日起）`;
            document.getElementById('mainTitle').textContent = title;
        };

        // 主题切换
        let isDark = localStorage.getItem('dark') === 'true';
        const initTheme = () => {
            document.body.classList.toggle('dark', isDark);
            document.getElementById('themeToggleBtn').textContent = isDark ? '切换浅色' : '切换暗黑';
        };

        // ========== 核心修复：动态计算面板位置，保证不消失 ==========
        const LAYOUT_KEY = 'dashboard_layout';
        // 获取顶部容器高度
        const getTitleHeight = () => {
            return document.getElementById('titleContainer').offsetHeight + 10;
        };
        // 初始化/重置面板默认位置
        const initPanelPosition = () => {
            const isMobile = window.innerWidth <= 768;
            const titleHeight = getTitleHeight();
            const windowHeight = window.innerHeight;
            // 移动端用相对定位，PC端用绝对定位
            if (isMobile) {
                document.getElementById('chartPanel').style.position = 'relative';
                document.getElementById('jsonPanel').style.position = 'relative';
                return;
            }
            // PC端固定位置，保证两个面板都在可视区域
            document.getElementById('chartPanel').style.position = 'absolute';
            document.getElementById('jsonPanel').style.position = 'absolute';
            // 图表面板：顶部+高度65%
            const chartPanel = document.getElementById('chartPanel');
            chartPanel.style.left = '10px';
            chartPanel.style.top = `${titleHeight}px`;
            chartPanel.style.width = `calc(100vw - 20px)`;
            chartPanel.style.height = `calc(${windowHeight * 0.65}px - ${titleHeight}px)`;
            chartPanel.style.zIndex = 12;
            // 数据面板：图表下方，高度30%
            const jsonPanel = document.getElementById('jsonPanel');
            jsonPanel.style.left = '10px';
            jsonPanel.style.top = `${windowHeight * 0.65 + 10}px`;
            jsonPanel.style.width = `calc(100vw - 20px)`;
            jsonPanel.style.height = `calc(${windowHeight * 0.3}px - 30px)`;
            jsonPanel.style.zIndex = 11;
            // 重置transform
            chartPanel.removeAttribute('data-x');
            chartPanel.removeAttribute('data-y');
            chartPanel.style.transform = 'translate(0,0)';
            jsonPanel.removeAttribute('data-x');
            jsonPanel.removeAttribute('data-y');
            jsonPanel.style.transform = 'translate(0,0)';
            // 图表自适应
            myChart.resize();
        };

        // 保存布局（仅PC端）
        const saveLayout = () => {
            if (window.innerWidth > 768) {
                const data = {};
                document.querySelectorAll('.draggable-panel').forEach(el => {
                    data[el.id] = { 
                        x: el.dataset.x || 0, 
                        y: el.dataset.y || 0, 
                        w: el.style.width, 
                        h: el.style.height 
                    };
                });
                localStorage.setItem(LAYOUT_KEY, JSON.stringify(data));
            }
        };

        // 加载布局（仅PC端）
        const loadLayout = () => {
            if (window.innerWidth <= 768) return;
            try {
                const data = JSON.parse(localStorage.getItem(LAYOUT_KEY));
                if (!data) return;
                Object.keys(data).forEach(id => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.style.width = data[id].w;
                    el.style.height = data[id].h;
                    el.dataset.x = data[id].x;
                    el.dataset.y = data[id].y;
                    el.style.transform = `translate(${data[id].x}px,${data[id].y}px)`;
                });
                myChart.resize();
            } catch { 
                localStorage.removeItem(LAYOUT_KEY);
                initPanelPosition();
            }
        };

        // 重置布局
        const resetLayout = () => {
            localStorage.removeItem(LAYOUT_KEY);
            initPanelPosition();
            showError('布局已重置');
        };

        // 功能按钮
        const copyLink = () => {
            const url = `${location.origin}${location.pathname}?date=${startDate}&product=${encodeURIComponent(productName)}&data=${encodeUsageData(document.getElementById('jsonInput').value)}`;
            navigator.clipboard.writeText(url).then(() => showError('复制成功')).catch(() => showError('复制失败'));
        };
        const clearData = () => {
            document.getElementById('jsonInput').value = '';
            renderChart();
            showError('数据已清空');
        };

        // 面板置顶
        document.querySelectorAll('.draggable-panel').forEach(panel => {
            panel.addEventListener('mousedown', () => {
                document.querySelectorAll('.draggable-panel').forEach(p => p.style.zIndex = 10);
                panel.style.zIndex = 20;
            });
        });

        // 拖拽缩放（仅PC端生效，避免移动端误触）
        const initDrag = () => {
            if (window.innerWidth > 768) {
                interact('.draggable-panel').draggable({
                    modifiers: [interact.modifiers.restrictRect({ restriction: 'body' })],
                    listeners: {
                        move(e) {
                            const t = e.target;
                            t.dataset.x = (parseFloat(t.dataset.x) || 0) + e.dx;
                            t.dataset.y = (parseFloat(t.dataset.y) || 0) + e.dy;
                            t.style.transform = `translate(${t.dataset.x}px,${t.dataset.y}px)`;
                            myChart.resize();
                        },
                        end: saveLayout
                    }
                }).resizable({
                    edges: { left: true, right: true, top: true, bottom: true },
                    listeners: {
                        move(e) {
                            const t = e.target;
                            t.style.width = e.rect.width + 'px';
                            t.style.height = e.rect.height + 'px';
                            t.dataset.x = (parseFloat(t.dataset.x) || 0) + e.deltaRect.left;
                            t.dataset.y = (parseFloat(t.dataset.y) || 0) + e.deltaRect.top;
                            t.style.transform = `translate(${t.dataset.x}px,${t.dataset.y}px)`;
                            myChart.resize();
                        },
                        end: saveLayout
                    }
                });
            } else {
                // 移动端销毁拖拽功能
                interact('.draggable-panel').unset();
            }
        };

        // 解析文本框数据
        const parseData = (text) => {
            return text.split('\n').map(line => line.trim()).filter(line => !isNaN(line) && line).map(Number);
        };

        // 渲染图表
        function renderChart() {
            const text = document.getElementById('jsonInput').value;
            const data = parseData(text);
            if (data.length === 0) { myChart.clear(); return; }

            const labels = generateDateLabels(startDate, data.length);
            const max = Math.max(...data);
            const min = Math.min(...data);
            const colors = isDark ? {
                text: '#e5e7eb', line: '#36cbcb', bg: 'rgba(45,45,66,0.95)'
            } : {
                text: '#333', line: '#1677ff', bg: 'rgba(255,255,255,0.95)'
            };

            const option = {
                grid: { top: 20, left: 50, right: 20, bottom: 60 },
                textStyle: { fontFamily: 'Microsoft YaHei', color: colors.text },
                tooltip: { trigger: 'axis', backgroundColor: colors.bg, textStyle: { color: colors.text } },
                legend: { data: ['日用量'], textStyle: { color: colors.text } },
                xAxis: { 
                    type: 'category', 
                    data: labels, 
                    axisLabel: { color: colors.text, rotate: 30, fontSize: window.innerWidth <= 768 ? 10 : 12 } 
                },
                yAxis: { 
                    type: 'value', 
                    min: Math.floor(min / 100) * 100 - 500, 
                    max: Math.ceil(max / 100) * 100 + 500, 
                    axisLabel: { color: colors.text, fontSize: window.innerWidth <= 768 ? 10 : 12 } 
                },
                series: [{
                    name: '日用量', type: 'line', smooth: true, data: data, color: colors.line,
                    symbolSize: window.innerWidth <= 768 ? 4 : 6,
                    lineStyle: { width: window.innerWidth <= 768 ? 2 : 2.5 },
                    areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: colors.line + '30' },
                        { offset: 1, color: colors.line + '00' }
                    ])}
                }]
            };
            myChart.setOption(option);
        }

        // 数据输入自动刷新
        const refreshChart = debounce(renderChart);

        // 屏幕旋转/尺寸变化适配
        window.addEventListener('resize', debounce(() => {
            initPanelPosition();
            initDrag();
            myChart.resize();
        }, 500));

        // 页面初始化
        window.onload = () => {
            const params = getUrlParams();
            if (params.date) startDate = params.date;
            if (params.product) {
                productName = decodeURIComponent(params.product);
                document.getElementById('productNameInput').value = productName;
            }

            // 赋值默认数据
            document.getElementById('jsonInput').value = decodeUsageData(params.data);
            
            // 初始化面板位置
            initPanelPosition();
            
            // 初始化日期选择器
            flatpickr('#startDatePicker', {
                defaultDate: startDate, dateFormat: 'Y-m-d', locale: 'zh',
                onChange: (_, dateStr) => { 
                    startDate = dateStr; 
                    updateTitle(dateStr, productName); 
                    renderChart();
                }
            });
            
            // 产品输入实时更新标题
            document.getElementById('productNameInput').addEventListener('input', function () {
                productName = this.value;
                updateTitle(startDate, productName);
                renderChart();
            });
            
            // 按钮事件
            document.getElementById('themeToggleBtn').onclick = () => { 
                isDark = !isDark; 
                localStorage.setItem('dark', isDark); 
                initTheme(); 
                renderChart(); 
            };
            document.getElementById('resetLayoutBtn').onclick = resetLayout;
            document.getElementById('copyLinkBtn').onclick = copyLink;
            document.getElementById('clearDataBtn').onclick = clearData;
            document.getElementById('jsonInput').addEventListener('input', refreshChart);

            // 初始化渲染
            updateTitle(startDate, productName);
            initTheme();
            loadLayout();
            initDrag();
            renderChart();
        };
    </script>
</body>
</html>
